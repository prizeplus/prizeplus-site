<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enter Sweepstakes - PrizePluse</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f4f4;
}

header{
background:#001f5c;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
display:flex;
align-items:center;
gap:12px;
color:white;
font-size:30px;
font-weight:700;
}

.logo img{
width:55px;
height:55px;
border-radius:10px;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
font-weight:500;
}

.wrap{
max-width:700px;
margin:70px auto;
background:white;
padding:45px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
text-align:center;
font-size:45px;
margin-bottom:10px;
color:#001f5c;
}

.sub{
text-align:center;
margin-bottom:35px;
color:#666;
}

input,select{
width:100%;
padding:18px;
margin-bottom:18px;
border:1px solid #ddd;
border-radius:12px;
font-size:16px;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.check{
margin:15px 0;
font-size:15px;
color:#333;
}

.check input{
width:auto;
margin-right:8px;
}

button{
width:100%;
padding:18px;
background:#ffd700;
border:none;
font-size:18px;
font-weight:700;
border-radius:12px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.note{
margin-top:18px;
font-size:14px;
text-align:center;
color:#666;
}

footer{
margin-top:60px;
background:#001f5c;
color:white;
text-align:center;
padding:25px;
}

@media(max-width:768px){
.row{
grid-template-columns:1fr;
}
nav{
display:none;
}
.wrap{
margin:30px 15px;
padding:30px;
}
h1{
font-size:34px;
}
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo.png">
PrizePluse
</div>

<nav>
<a href="index.html">Home</a>
<a href="enter.html">Enter</a>
<a href="winners.html">Winners</a>
<a href="claim.html">Claim</a>
<a href="contact.html">Support</a>
</nav>
</header>

<div class="wrap">

<h1>Enter Now</h1>
<p class="sub">Complete your entry for worldwide rewards.</p>

<form>

<input type="text" placeholder="Full Name" required>
<input type="email" placeholder="Email Address" required>

<div class="row">
<input type="tel" placeholder="Phone Number">
<select>
<option>Select Country</option>
<option>Jamaica</option>
<option>USA</option>
<option>Canada</option>
<option>UK</option>
<option>Germany</option>
<option>Brazil</option>
<option>Other</option>
</select>
</div>

<select>
<option>Prize Interest</option>
<option>Cash Rewards</option>
<option>Phones</option>
<option>Laptops</option>
<option>Gift Cards</option>
</select>

<label class="check">
<input type="checkbox" required>
I confirm I am 18+ and agree to terms.
</label>

<button type="submit">Submit Entry</button>

<p class="note">🔒 Secure encrypted submission.</p>

</form>

</div>

<footer>
© 2026 PrizePluse. All Rights Reserved.
</footer>

</body>
</html>
