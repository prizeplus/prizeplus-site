<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Enter - PrizePlus</title>

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#eef1f6;
}

header{
background:#001f63;
padding:18px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
display:flex;
align-items:center;
gap:12px;
color:#fff;
font-size:34px;
font-weight:800;
}

.logo img{
height:55px;
}

nav a{
color:white;
text-decoration:none;
margin-left:24px;
font-size:18px;
}

.wrap{
max-width:700px;
margin:auto;
padding:60px 20px;
}

.box{
background:white;
padding:45px;
border-radius:18px;
box-shadow:0 12px 30px rgba(0,0,0,.08);
}

h1{
text-align:center;
font-size:44px;
margin-bottom:30px;
}

input,select{
width:100%;
padding:18px;
margin-bottom:18px;
border:1px solid #ccc;
border-radius:12px;
font-size:18px;
box-sizing:border-box;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:12px;
background:#ffd700;
font-size:22px;
font-weight:800;
cursor:pointer;
}

button:hover{
background:#ffca00;
}

.note{
font-size:14px;
color:#555;
margin-top:14px;
line-height:1.5;
}

#msg{
margin-top:18px;
font-weight:700;
text-align:center;
font-size:18px;
}

footer{
text-align:center;
padding:30px;
color:#666;
font-size:14px;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo.png">
<span>PrizePlus</span>
</div>

<nav>
<a href="index.html">Home</a>
<a href="winners.html">Winners</a>
<a href="claim.html">Claim</a>
<a href="contact.html">Support</a>
</nav>
</header>

<div class="wrap">
<div class="box">

<h1>Enter Sweepstakes</h1>

<form id="entryForm">

<input type="text" id="name" placeholder="Full Name" required>

<input type="email" id="email" placeholder="Email Address" required>

<select id="country" required>
<option value="">Select Country</option>
<option>Jamaica</option>
<option>United States</option>
<option>Canada</option>
<option>United Kingdom</option>
<option>Trinidad</option>
<option>Barbados</option>
<option>Guyana</option>
<option>Nigeria</option>
<option>India</option>
<option>Australia</option>
<option>Other</option>
</select>

<input type="text" id="phone" placeholder="Phone Number (optional)">

<button type="submit">Submit Entry</button>

</form>

<div id="msg"></div>

<div class="note">
By entering, you agree to our Privacy Policy and Terms.  
Collected data may include browser/device info and IP for fraud prevention and regional eligibility checks.
</div>

</div>
</div>

<footer>
© 2026 PrizePlus. All rights reserved.
</footer>

<script>
const form=document.getElementById("entryForm");
const msg=document.getElementById("msg");

form.addEventListener("submit",async function(e){
e.preventDefault();

msg.innerHTML="Submitting...";

let ip="Unknown";

try{
let res=await fetch("https://api.ipify.org?format=json");
let data=await res.json();
ip=data.ip;
}catch(err){}

const payload={
name:document.getElementById("name").value,
email:document.getElementById("email").value,
country:document.getElementById("country").value,
phone:document.getElementById("phone").value,
ip:ip,
device:navigator.userAgent,
referrer:document.referrer
};

try{

await fetch("https://script.google.com/macros/s/AKfycbxkYs8s5_W8HcqXgCXMnhMHIiAcVOh8nsy74ReBLj1oa1GqXr5s0axL3xIqDjLiksze/exec",{
method:"POST",
body:JSON.stringify(payload)
});

msg.style.color="green";
msg.innerHTML="Entry Submitted Successfully!";
form.reset();

}catch(error){

msg.style.color="red";
msg.innerHTML="Submission Failed. Try Again.";

}

});
</script>

</body>
</html>
